<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dua Video App</title>

<style>

body
{
    margin: 0;

    height: 100vh;

    display: flex;

    justify-content: center;

    align-items: center;

    font-family: Arial;

    background: linear-gradient(to right, #11998e, #38ef7d);
}

.container
{
    width: 600px;

    background: white;

    padding: 30px;

    border-radius: 20px;

    text-align: center;
}

h1
{
    margin-bottom: 20px;
}

#dua
{
    font-size: 28px;

    margin: 20px 0;
}

video
{
    width: 100%;
    height: 250px;
    border-radius: 15px;

    margin-bottom: 20px;
}

button
{
    padding: 15px 25px;

    font-size: 20px;

    border: none;

    border-radius: 10px;

    background: teal;

    color: white;

    cursor: pointer;
}

</style>

</head>

<body>

<div class="container">

    <h1>
        🤲 Beautiful Dua Collection
    </h1>

    <div id="dua">
        Click Below to Play Dua
    </div>

    <!-- <div id = "video"> -->
    <video id="video" controls>

        <source src="dua1.mp4" type="video/mp4">
    </video>
     <!-- </div> -->

    <br><br>

    <button onclick="showDua()">
        ▶ Play Dua
    </button>

</div>

<script>

function showDua()
{

    let videos = ["dua1.mp4", "dua2.mp4", "dua3.mp4"];

    let randomNumber = Math.floor(Math.random() * 3);

    document.getElementById("video").src = videos[randomNumber];
}

</script>

</body>

</html>
